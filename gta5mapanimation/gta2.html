<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GTA-style Map with Vector Tiles</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .mapboxgl-popup {
            max-width: 400px;
            font: 12px/20px 'Helvetica Neue', Arial, Helvetica, sans-serif;
        }
        #legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 3px;
        }
        .pulse {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
            opacity: 0;
            pointer-events: none;
        }
        @keyframes pulsate {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.3); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        @keyframes breathe {
            0% { transform: scale(1) rotate(0); }
            50% { transform: scale(1.1) rotate(-0.6deg); }
            100% { transform: scale(1) rotate(0); }
        }
        #character-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            z-index: 1000;
        }
        .transition-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="pulse"></div>
    <div class="transition-overlay"></div>
    <div id="character-info"></div>
    <div id="legend"></div>
    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoibWlsaW5kc29uaSIsImEiOiJjbDRjc2ZxaTgwMW5hM3Bqbmlka3VweWVkIn0.AM0QzfbGzUZc04vZ6o2uaw';
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v10',
            zoom: 3,
            center: [-98.5795, 39.8283]  // Center of USA
        });

        const locations = [
            { name: 'Michael', coords: [-118.2437, 34.0522], description: 'Los Santos' },
            { name: 'Franklin', coords: [-87.6298, 41.8781], description: 'North Yankton' },
            { name: 'Trevor', coords: [-74.0060, 40.7128], description: 'Sandy Shores' }
        ];

        let currentLocationIndex = 0;

        function updateCharacterInfo(character) {
            const infoElement = document.getElementById('character-info');
            infoElement.innerHTML = `${character.name}<br>${character.description}`;
        }

        function switchCharacter() {
            const pulseElement = document.querySelector('.pulse');
            const mapElement = document.getElementById('map');
            const overlayElement = document.querySelector('.transition-overlay');
            const startLocation = locations[currentLocationIndex];
            currentLocationIndex = (currentLocationIndex + 1) % locations.length;
            const endLocation = locations[currentLocationIndex];

            // Fade to black
            overlayElement.style.opacity = '1';

            setTimeout(() => {
                // Start zoomed in
                map.jumpTo({
                    center: startLocation.coords,
                    zoom: 18,
                    pitch: 60,
                    bearing: 0
                });

                // Fade from black
                overlayElement.style.opacity = '0';
            }, 500);

            // Instant zoom out to an intermediate level
            setTimeout(() => {
                map.easeTo({
                    center: startLocation.coords,
                    zoom: 12,
                    pitch: 0,
                    bearing: 0,
                    duration: 0
                });
            }, 1500);

            // Pause with breathing effect
            setTimeout(() => {
                pulseElement.style.animation = 'pulsate 1s ease-out infinite';
                mapElement.style.animation = 'breathe 6s ease-out infinite';
            }, 2000);

            // Instant zoom out again to a broader view
            setTimeout(() => {
                map.easeTo({
                    center: [-98.5795, 39.8283],
                    zoom: 6,
                    pitch: 0,
                    bearing: 0,
                    duration: 0
                });
            }, 5000);

            // Gradual fly to new location
            setTimeout(() => {
                map.easeTo({
                    center: endLocation.coords,
                    zoom: 6,
                    pitch: 0,
                    bearing: 0,
                    duration: 5000,
                    easing: (t) => t * (2 - t)
                });
                updateCharacterInfo(endLocation);
            }, 8000);

            // Pause with breathing effect
            setTimeout(() => {
                pulseElement.style.animation = 'pulsate 1s ease-out infinite';
                mapElement.style.animation = 'breathe 6s ease-out infinite';
            }, 13000);

            // Instant zoom in on new location
            setTimeout(() => {
                map.easeTo({
                    center: endLocation.coords,
                    zoom: 12,
                    pitch: 0,
                    bearing: 0,
                    duration: 0
                });
            }, 18000);

            // Final instant zoom in to new location
            setTimeout(() => {
                map.easeTo({
                    center: endLocation.coords,
                    zoom: 18,
                    pitch: 60,
                    bearing: 0,
                    duration: 0
                });

                // Stop pulse and breathing effects
                setTimeout(() => {
                    pulseElement.style.animation = 'none';
                    mapElement.style.animation = 'none';
                }, 2000);
            }, 19000);
        }

        const popup = new mapboxgl.Popup({
            closeButton: false,
            closeOnClick: false
        });

        const colorScale = chroma.scale(['#FF0000', '#FF6600', '#FFFF00', '#00FF00', '#0000FF'])
        .mode('lch').domain([0, 0.25, 0.5, 0.75, 1]);

        map.on('load', () => {
            locations.forEach(location => {
                new mapboxgl.Marker()
                    .setLngLat(location.coords)
                    .addTo(map);
            });

            updateCharacterInfo(locations[0]);

            map.addSource('fused-vector-source', {
                'type': 'vector',
                'tiles': [
                    'https://www.fused.io/server/v1/realtime-shared/fsh_3w7IJbltI8eSVQMXZmUptj/run/tiles/{z}/{x}/{y}?dtype_out_vector=mvt&input_array=%5B0.27191754325775995%2C0.11549210995783607%2C0.11694224270690993%2C0.0000824977329505335%2C0.0009409706391030265%2C0.0024134019047700405%2C0.006273084427569246%2C0.0029774599983857838%2C0.005402980251973707%2C0.005980466288260085%2C0.00010333520330429262%2C0.0000031371390529481384%5D'
                ],
                'minzoom': 6,
                'maxzoom': 14
            });

            map.addLayer({
                'id': 'fused-vector-layer',
                'type': 'fill',
                'source': 'fused-vector-source',
                'source-layer': 'udf',
                'paint': {
                    'fill-color': [
                        'interpolate',
                        ['linear'],
                        ['get', 'similarity'],
                        0, colorScale(0).hex(),
                        0.25, colorScale(0.25).hex(),
                        0.5, colorScale(0.5).hex(),
                        0.75, colorScale(0.75).hex(),
                        1, colorScale(1).hex()
                    ],
                    'fill-opacity': 0.7
                }
            });

            map.on('mousemove', 'fused-vector-layer', (e) => {
                if (e.features.length > 0) {
                    const feature = e.features[0];
                    const coordinates = e.lngLat;

                    let popupContent = '<h3>Feature Properties:</h3>';
                    for (const property in feature.properties) {
                        popupContent += `<strong>${property}:</strong> ${feature.properties[property]}<br>`;
                    }

                    popup.setLngLat(coordinates).setHTML(popupContent).addTo(map);
                }
            });

            map.on('mouseleave', 'fused-vector-layer', () => {
                popup.remove();
            });

            const legend = document.getElementById('legend');
            const gradientSteps = 5;
            for (let i = 0; i <= gradientSteps; i++) {
                const step = i / gradientSteps;
                const color = colorScale(step).hex();
                legend.innerHTML += `<div style="background: ${color}; width: 20px; height: 20px; display: inline-block;"></div>`;
            }
            legend.innerHTML += '<br>Low Similarity <span style="float: right;">High Similarity</span>';

            // Initial character switch after a delay
            setTimeout(switchCharacter, 2000);

            // Switch character every 45 seconds to match the sequence
            setInterval(switchCharacter, 45000);
        });

        map.on('error', (e) => {
            console.error('Mapbox GL JS error:', e);
        });
    </script>
</body>
</html>
